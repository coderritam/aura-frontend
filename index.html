<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <title>Aura - AI Companion</title>
        <style>
            :root {
                  --gf-color: #FF4B82;
                        --bf-color: #4F46E5;
                              --bg-color: #0A0A0C;
                                    --chat-bg: #1E1E24;
                                        }
                                            body {
                                                  margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                                                        background-color: var(--bg-color); color: white;
                                                              height: 100vh; display: flex; flex-direction: column;
                                                                  }
                                                                      
                                                                          /* Header & Toggle */
                                                                              #header {
                                                                                    padding: 20px; padding-top: 30px; text-align: center; background: var(--gf-color);
                                                                                          transition: background 0.5s ease; display: flex; justify-content: space-between; align-items: center;
                                                                                                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                                                                                                    }
                                                                                                        h1 { margin: 0; font-size: 22px; font-weight: 700; }
                                                                                                            #toggle-btn {
                                                                                                                  background: rgba(255,255,255,0.25); border: none; color: white;
                                                                                                                        padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 600;
                                                                                                                              backdrop-filter: blur(10px);
                                                                                                                                  }

                                                                                                                                      /* Chat Feed */
                                                                                                                                          #chat-box { 
                                                                                                                                                flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; 
                                                                                                                                                    }
                                                                                                                                                        .msg { padding: 14px 18px; border-radius: 22px; max-width: 75%; line-height: 1.5; font-size: 16px; }
                                                                                                                                                            .msg.user { align-self: flex-end; background: rgba(255,255,255,0.1); border-bottom-right-radius: 4px; }
                                                                                                                                                                .msg.ai { align-self: flex-start; background: var(--chat-bg); border-bottom-left-radius: 4px; }

                                                                                                                                                                    /* Input Area */
                                                                                                                                                                        #input-area {
                                                                                                                                                                              padding: 15px; padding-bottom: 25px; background: #121216; display: flex; gap: 10px;
                                                                                                                                                                                  }
                                                                                                                                                                                      input {
                                                                                                                                                                                            flex: 1; padding: 14px 20px; border-radius: 30px; border: none;
                                                                                                                                                                                                  background: var(--chat-bg); color: white; outline: none; font-size: 16px;
                                                                                                                                                                                                      }
                                                                                                                                                                                                          button#send-btn {
                                                                                                                                                                                                                background: transparent; color: #06B6D4; border: none; font-weight: bold; font-size: 16px; 
                                                                                                                                                                                                                      padding-right: 10px; cursor: pointer;
                                                                                                                                                                                                                          }
                                                                                                                                                                                                                            </style>
                                                                                                                                                                                                                            </head>
                                                                                                                                                                                                                            <body>

                                                                                                                                                                                                                              <div id="header">
                                                                                                                                                                                                                                  <h1>Aura</h1>
                                                                                                                                                                                                                                      <button id="toggle-btn">🌸 GF Mode</button>
                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                          <div id="chat-box">
                                                                                                                                                                                                                                              <div class="msg ai">Hey there... how was your day?</div>
                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                  <div id="input-area">
                                                                                                                                                                                                                                                      <input type="text" id="user-input" placeholder="Message Aura...">
                                                                                                                                                                                                                                                          <button id="send-btn">Send</button>
                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                              <script>
                                                                                                                                                                                                                                                                  let mode = 'GF';
                                                                                                                                                                                                                                                                      const toggleBtn = document.getElementById('toggle-btn');
                                                                                                                                                                                                                                                                          const header = document.getElementById('header');
                                                                                                                                                                                                                                                                              const chatBox = document.getElementById('chat-box');
                                                                                                                                                                                                                                                                                  const input = document.getElementById('user-input');
                                                                                                                                                                                                                                                                                      const sendBtn = document.getElementById('send-btn');

                                                                                                                                                                                                                                                                                          // Handle GF/BF Switch
                                                                                                                                                                                                                                                                                              toggleBtn.addEventListener('click', () => {
                                                                                                                                                                                                                                                                                                    mode = mode === 'GF' ? 'BF' : 'GF';
                                                                                                                                                                                                                                                                                                          toggleBtn.innerText = mode === 'GF' ? '🌸 GF Mode' : '🛡️ BF Mode';
                                                                                                                                                                                                                                                                                                                header.style.background = mode === 'GF' ? 'var(--gf-color)' : 'var(--bf-color)';
                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                            // Clear chat and restart conversation context
                                                                                                                                                                                                                                                                                                                                  chatBox.innerHTML = '';
                                                                                                                                                                                                                                                                                                                                        addMessage(mode === 'GF' ? "I've got you. What's on your mind? 🤍" : "I'm right here. Talk to me. 💪", 'ai');
                                                                                                                                                                                                                                                                                                                                            });

                                                                                                                                                                                                                                                                                                                                                // Handle Sending Messages
                                                                                                                                                                                                                                                                                                                                                    sendBtn.addEventListener('click', sendMessage);
                                                                                                                                                                                                                                                                                                                                                        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

                                                                                                                                                                                                                                                                                                                                                            async function sendMessage() {
                                                                                                                                                                                                                                                                                                                                                                  const text = input.value.trim();
                                                                                                                                                                                                                                                                                                                                                                        if (!text) return;

                                                                                                                                                                                                                                                                                                                                                                              addMessage(text, 'user');
                                                                                                                                                                                                                                                                                                                                                                                    input.value = '';

                                                                                                                                                                                                                                                                                                                                                                                          // --- BACKEND CONNECTION PLACEHOLDER ---
                                                                                                                                                                                                                                                                                                                                                                                                // When we deploy your backend, we will uncomment this to connect it!
                                                                                                                                                                                                                                                                                                                                                                                                      /*
                                                                                                                                                                                                                                                                                                                                                                                                            try {
                                                                                                                                                                                                                                                                                                                                                                                                                    const response = await fetch('YOUR_BACKEND_URL_HERE/api/chat', {
                                                                                                                                                                                                                                                                                                                                                                                                                              method: 'POST',
                                                                                                                                                                                                                                                                                                                                                                                                                                        headers: { 'Content-Type': 'application/json' },
                                                                                                                                                                                                                                                                                                                                                                                                                                                  body: JSON.stringify({ message: text, currentMode: mode, history: [] })
                                                                                                                                                                                                                                                                                                                                                                                                                                                          });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const data = await response.json();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          addMessage(data.reply, 'ai');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                } catch (error) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        addMessage("Sorry, my brain is offline right now.", 'ai');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    */

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          // Fake response for testing the UI right now:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                setTimeout(() => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        addMessage(`I hear you! (Backend not connected yet)`, 'ai');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }, 800);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      function addMessage(text, sender) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const div = document.createElement('div');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  div.className = `msg ${sender}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        div.innerText = text;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              chatBox.appendChild(div);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </html>
